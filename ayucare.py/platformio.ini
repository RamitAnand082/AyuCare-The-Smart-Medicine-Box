[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Port: run `pio device list` if upload fails — update COM number if it changed.
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
; "Wrong boot mode (0x13)" = ESP is running your sketch, not UART bootloader.
; Try ck vs nodemcu: DTR/RTS-to-GPIO0/EN wiring differs per board.
upload_resetmethod = ck
upload_speed = 115200
upload_flags =
  --connect-attempts
  15

lib_deps =
  marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
  bblanchon/ArduinoJson @ ^7.0.0
